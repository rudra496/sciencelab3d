name: Welcome New Contributors
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]
jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "👋 Welcome to ScienceLab 3D! Thanks for your first issue."
          pr-message: "👋 Welcome to ScienceLab 3D! Thanks for your first PR."
