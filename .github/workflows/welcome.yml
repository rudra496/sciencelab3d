name: Welcome New Contributors
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]
jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: "👋 Welcome to ScienceLab 3D! Thanks for your first issue."
          pr_message: "👋 Welcome to ScienceLab 3D! Thanks for your first PR."
